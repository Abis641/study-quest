name: study_quest
description: Study Quest - Educational Android TV App for Kids
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI / Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Navigation
  go_router: ^14.2.7

  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/profile_photos/
    - assets/sounds/

  # Fonts are served via the google_fonts package at runtime.
  # To bundle them offline, download Nunito from fonts.google.com,
  # place the .ttf files in assets/fonts/, and uncomment below:
  #
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito-ExtraBold.ttf
  #         weight: 800
