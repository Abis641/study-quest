workflows:
  android-tv-debug:
    name: Study Quest - Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Inject google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON" > "$CM_BUILD_DIR/android/app/google-services.json"

      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate Android files
        script: |
          flutter build apk --config-only

      - name: Build Debug APK
        script: |
          flutter build apk --debug --verbose

    artifacts:
      - "**/*.apk"
